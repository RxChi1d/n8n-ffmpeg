name: Build and Push n8n-ffmpeg

on:
  workflow_call:
    inputs:
      n8n-version:
        required: true
        type: string
      variant:
        description: 'Image variant to build (main or runners)'
        required: false
        type: string
        default: 'main'
  workflow_dispatch:
    inputs:
      n8n-version:
        description: 'n8n version to build'
        required: true
        default: 'latest'
      variant:
        description: 'Image variant to build'
        required: true
        type: choice
        default: 'main'
        options:
          - main
          - runners

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve variant
        id: variant
        run: |
          case "${{ inputs.variant }}" in
            main)
              echo "dockerfile=Dockerfile" >> $GITHUB_OUTPUT
              echo "image=rxchi1d/n8n-ffmpeg" >> $GITHUB_OUTPUT
              ;;
            runners)
              echo "dockerfile=Dockerfile.runners" >> $GITHUB_OUTPUT
              echo "image=rxchi1d/n8n-runners-ffmpeg" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unknown variant: ${{ inputs.variant }}" >&2
              exit 1
              ;;
          esac

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ steps.variant.outputs.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            N8N_VERSION=${{ inputs.n8n-version }}
          tags: |
            ${{ steps.variant.outputs.image }}:${{ inputs.n8n-version }}
            ${{ steps.variant.outputs.image }}:latest
          cache-from: type=gha,scope=${{ inputs.variant }}
          cache-to: type=gha,mode=max,scope=${{ inputs.variant }}
